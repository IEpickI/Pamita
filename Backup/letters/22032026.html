<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para tú</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff7fb;
    font-family: sans-serif;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  h1 {
    font-size: 2.2rem;
    margin-bottom: 20px;
    color: #d14b72;
    letter-spacing: 1px;
  }

  svg {
    width: 220px;
    height: auto;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Para tú</h1>

  <svg viewBox="0 0 200 300">

    <!-- bucket -->
    <path d="M60 180 L140 180 L130 240 L70 240 Z" fill="#f4a261"/>
    <ellipse cx="100" cy="180" rx="40" ry="10" fill="#e76f51"/>
	
	
	<!-- stems -->
    <line x1="100" y1="180" x2="100" y2="90" stroke="#3a7d44" stroke-width="3"/>
    <line x1="80" y1="180" x2="80" y2="110" stroke="#3a7d44" stroke-width="3"/>
    <line x1="120" y1="180" x2="120" y2="110" stroke="#3a7d44" stroke-width="3"/>
    
	<ellipse cx="92" cy="180" rx="10" ry="5" fill="#4caf50" transform="rotate(-30 60 140)"/>
    <ellipse cx="80" cy="130" rx="10" ry="5" fill="#4caf50" transform="rotate(30 105 150)"/>

	<!-- flower 1 -->
    <circle cx="100" cy="65" r="8" fill="#4a9cff"/>
	<circle cx="110" cy="90" r="8" fill="#4a9cff"/>
	<circle cx="110" cy="70" r="8" fill="#4a9cff"/>
	<circle cx="90" cy="70" r="8" fill="#4a9cff"/>
	<circle cx="90" cy="90" r="8" fill="#4a9cff"/>
    <circle cx="115" cy="80" r="8" fill="#4a9cff"/>
    <circle cx="100" cy="95" r="8" fill="#4a9cff"/>
    <circle cx="85" cy="80" r="8" fill="#4a9cff"/>
	
	<circle cx="100" cy="80" r="10" fill="#ffe400"/>
	
	<!-- flower 2 -->
    
    <circle cx="80" cy="110" r="6" fill="#ffb347"/>
    <circle cx="90" cy="120" r="6" fill="#ffb347"/>
    <circle cx="80" cy="130" r="6" fill="#ffb347"/>
    <circle cx="70" cy="120" r="6" fill="#ffb347"/>
	
	<circle cx="87" cy="113" r="6" fill="#ffb347"/>
	<circle cx="73" cy="113" r="6" fill="#ffb347"/>
	
	<circle cx="87" cy="127" r="6" fill="#ffb347"/>
	<circle cx="73" cy="127" r="6" fill="#ffb347"/>
	
	<circle cx="80" cy="120" r="8" fill="#ffe400"/>

    <!-- flower 3 -->
    
    <circle cx="120" cy="99" r="6" fill="#7e3991"/>
    <circle cx="130" cy="110" r="6" fill="#7e3991"/>
    <circle cx="120" cy="121" r="6" fill="#7e3991"/>
    <circle cx="110" cy="110" r="6" fill="#7e3991"/>
	
	<circle cx="127" cy="118" r="6" fill="#7e3991"/>
	<circle cx="112" cy="118" r="6" fill="#7e3991"/>
	<circle cx="127" cy="103" r="6" fill="#7e3991"/>
	<circle cx="112" cy="103" r="6" fill="#7e3991"/>
	
	<circle cx="120" cy="110" r="8" fill="#ffe400"/>
	
	<!-- leaves -->
    <ellipse cx="80" cy="160" rx="10" ry="5" fill="#4caf50" transform="rotate(-30 60 140)"/>
    <ellipse cx="78" cy="170" rx="10" ry="5" fill="#4caf50" transform="rotate(30 105 150)"/>
	
	<ellipse cx="115" cy="180" rx="10" ry="5" fill="#4caf50" transform="rotate(-30 60 140)"/>
    <ellipse cx="105" cy="135" rx="10" ry="5" fill="#4caf50" transform="rotate(30 105 150)"/>

    
  </svg>
</div>

</body>
</html>
