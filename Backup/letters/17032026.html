<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para tú</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: linear-gradient(#ffeaf3, #ffd6e8);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

#card {
    max-width: 320px;
    padding: 25px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

#message {
    font-size: 20px;
    min-height: 80px;
    color: #444;
    line-height: 1.4;
    /* Center text vertically */
    display: flex;
    align-items: center;
    justify-content: center;
}

button {
    padding: 14px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: #ff77a8;
    color: white;
    cursor: pointer;
    transition: opacity 0.4s, transform 0.2s;
}

button:active {
    transform: scale(0.95);
}

.fade {
    animation: fade 0.4s;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

#finalHeart {
    font-size: 60px;
    display: none; /* Changed from opacity:0 to hide it from layout */
    margin-top: 10px;
}

/* pumping animation */
.pump {
    display: block !important; /* Force display when active */
    animation: pump 0.8s infinite;
}

@keyframes pump {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="card">
    <div id="message">Tap to see something ❤️</div>
    <div id="finalHeart">❤️</div>
    <br>
    <button onclick="nextMessage()">Tap</button>
</div>

<script>
const messages = [
    "You’re my favorite part of every day.",
    "You’re so naturally beautiful.",
    "You make small moments feel special.",
    "I could listen to you forever.",
    "You’re my calm.",
    "You make me smile without trying.",
    "You’re genuinely one of a kind.",
    "You make the world feel better."
];

const heart = document.getElementById("finalHeart");
const messageEl = document.getElementById("message");
const button = document.querySelector("button");

let index = 0;

function nextMessage() {
    if (index < messages.length) {
        // Reset animation
        messageEl.classList.remove("fade");
        void messageEl.offsetWidth; 
        messageEl.classList.add("fade");

        messageEl.innerText = messages[index];
        index++;

        button.innerText = "Tap again";
    } else {
        messageEl.innerText = "And I could keep going forever ❤️";

        // Smoothly hide button
        button.style.opacity = "0";
        button.style.pointerEvents = "none";

        // Wait for button fade before showing heart
        setTimeout(() => {
            button.style.display = "none";
            heart.classList.add("pump"); // This will now trigger display: block
        }, 0);
    }
}
</script>

</body>
</html>
