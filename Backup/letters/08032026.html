<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores para ti</title>

<style>

body{
    margin:0;
    font-family:system-ui, Arial;
    text-align:center;
    background:#ffeef5;
    padding:20px;
}

h1{
    color:#ff4f8b;
}

#game{
    max-width:420px;
    margin:auto;
}

#flowers{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.flower{
    font-size:40px;
    cursor:pointer;
    transition:transform 0.2s;
}

.flower:active{
    transform:scale(0.85);
}

#bouquet{
    margin-top:25px;
    font-size:36px;
    min-height:45px;
}

#message{
    margin-top:20px;
    font-size:18px;
    color:#444;
    min-height:40px;
}

#final{
    margin-top:25px;
    font-size:22px;
    color:#ff4f8b;
}

</style>
</head>

<body>

<div id="game">

<h1>Flores para tú 🌸</h1>
<p>Toca las flores para crear un ramo.</p>

<div id="flowers">
<span class="flower">🌸</span>
<span class="flower">🌹</span>
<span class="flower">🌷</span>
<span class="flower">🌻</span>
<span class="flower">🌼</span>
</div>

<div id="bouquet"></div>

<div id="message"></div>

<div id="final"></div>

</div>

<script>

const flowers = document.querySelectorAll(".flower")
const bouquet = document.getElementById("bouquet")
const message = document.getElementById("message")
const final = document.getElementById("final")

let collected = 0

const messages = [
"Porque eres increíble",
"Porque eres hermosa",
"Porque eres fuerte",
"Por tu hermosa sonrisa",
"Por ser tú"
]

flowers.forEach((flower,i)=>{

flower.addEventListener("click",()=>{

if(flower.style.opacity==="0.3") return

flower.style.opacity="0.3"
bouquet.innerHTML += flower.innerHTML

message.innerText = messages[i]

collected++

if(collected===flowers.length){

final.innerText =
"Feliz Día Internacional de la Mujer. Eres increíble ❤️"

}

})

})

</script>

</body>
</html>
