<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch Me</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #a1d3ed;
    font-family: sans-serif;
  }

  #plane {
    position: absolute;
    width: 70px;
    height: 70px;
    transform-origin: center;
  }

  #messageBox {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 250px;
    background: #fdf5e6;
    border: 1px solid #d2b48c;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    z-index: 10;
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0;
    text-align: center;
  }

  #messageBox.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  #message {
    font-size: 1.2rem;
    color: #333;
  }
</style>
</head>

<body>

<img id="plane" src="images/paperplane.png">

<div id="messageBox">
  <div id="message">
    Pami,
	no importa cuántos kilómetros haya,
	siempre termino pensando en ti.❤️
  </div>
</div>

<script>
  const plane = document.getElementById("plane");
  const messageBox = document.getElementById("messageBox");

  let t = 0;

  // center + size of the 8
  let centerX = window.innerWidth / 2;
  let centerY = window.innerHeight / 2;

  let scale = Math.min(window.innerWidth, window.innerHeight) / 2;

  // random variation
  let speed = 0.015;
  let offset = Math.random() * Math.PI;

  function getPosition(time) {
    // Lemniscate-style 8 curve
    let x = Math.sin(time * 2 + offset) / 2;
    let y = Math.sin(time + offset);

    return {
      x: centerX + x * scale,
      y: centerY + y * scale
    };
  }

  function movePlane() {
    let current = getPosition(t);
    let next = getPosition(t + 0.01);

    // position
    plane.style.left = current.x + "px";
    plane.style.top = current.y + "px";

    // direction (angle)
    let dx = next.x - current.x;
    let dy = next.y - current.y;
    let angle = Math.atan2(dy, dx) * (180 / Math.PI);

    plane.style.transform = `rotate(${angle}deg)`;

    t += speed;

    requestAnimationFrame(movePlane);
  }

  movePlane();

  
  plane.addEventListener("click", () => {
    plane.style.transform = "scale(1.0)";
    setTimeout(() => {
      plane.style.display = "none";
      messageBox.classList.add("show");
    }, 1);
  });

  
  plane.addEventListener("touchstart", () => {
    plane.click();
  });
</script>

</body>
</html>
