<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achiota Dress Up</title>

<style>

body{
font-family:system-ui;
text-align:center;
background:#ffeef5;
margin:0;
padding:20px;
}

h1{
color:#ff4f8b;
}

#game{
max-width:420px;
margin:auto;
}

.axolotl-container{
position:relative;
width:240px;
margin:25px auto;
}

.axolotl{
width:100%;
display:block;
}

/* accessories positioned over axolotl */

.accessory{
position:absolute;
left:50%;
transform:translateX(-50%);
display:none;
pointer-events:none;
}

/* individual placement */

#sombrero{
top:-45px;
width:180px;
}

#scarf{
top:60px;
width:143px;
height:70px;
}

#hat{
top:-35px;
width:100px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:12px;
font-size:16px;
background:#ff77a8;
color:white;
cursor:pointer;
width:30%;
}

button:active{
transform:scale(0.95);
}

#message{
margin-top:25px;
font-size:18px;
color:#444;
min-height:40px;
}

</style>
</head>

<body>

<div id="game">

<h1>Dress Achiota</h1>
<p>Give her something to wear.</p>

<div class="axolotl-container">

<svg id="axolotl" class="axolotl" viewBox="0 0 200 120">

<!-- LEFT GILLS -->
<g stroke="#ff7aa8" stroke-width="10" stroke-linecap="round">
<line x1="80" y1="25" x2="70" y2="20"/>
<line x1="75" y1="32" x2="60" y2="32"/>
<line x1="80" y1="40" x2="60" y2="45"/>
</g>

<!-- RIGHT GILLS -->
<g stroke="#ff7aa8" stroke-width="10" stroke-linecap="round">
<line x1="120" y1="25" x2="130" y2="20"/>
<line x1="125" y1="32" x2="140" y2="32"/>
<line x1="120" y1="40" x2="140" y2="45"/>
</g>

<ellipse cx="100" cy="70" rx="55" ry="30" fill="#ff9ec4"/>
<circle cx="100" cy="50" r="35" fill="#ff9ec4"/>

<circle cx="85" cy="45" r="5" fill="#000"/>
<circle cx="115" cy="45" r="5" fill="#000"/>

<path id="mouth" d="M85 60 Q100 70 115 60" stroke="#000" stroke-width="3" fill="transparent"/>

</svg>

<img src="images/sombrero.png" id="sombrero" class="accessory">
<img src="images/scarf.png" id="scarf" class="accessory">
<img src="images/hat.png" id="hat" class="accessory">

</div>

<div>

<button onclick="dress('sombrero')">🇲🇽 Sombrero</button>
<button onclick="dress('scarf')">🧣 Scarf</button>
<button onclick="dress('hat')">🧢 Hat</button>

</div>

<div id="message"></div>

</div>

<script>

const message = document.getElementById("message")

function hideAll(){
document.querySelectorAll(".accessory").forEach(e=>{
e.style.display="none"
})
}

function dress(item){

hideAll()

document.getElementById(item).style.display="block"


}

</script>

</body>
</html>
