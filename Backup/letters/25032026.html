<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Differences</title>

<style>
  body {
    margin: 0;
    background: #111;
    font-family: sans-serif;
    color: white;
    text-align: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 10px;
  }

  svg {
    width: 92vw;
    max-width: 420px;
    background: #87ceeb;
    border-radius: 12px;
  }

  .mark {
    fill: none;
    stroke: red;
    stroke-width: 2;
  }

  #message {
    opacity: 0;
    transition: opacity 0.5s;
  }

  #message.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div class="container">

<!-- IMAGE 1 -->
<svg viewBox="0 0 100 100" id="svg1">

  <!-- sky -->
  <rect width="100" height="100" fill="#87ceeb"/>

  <!-- clouds -->
  <circle cx="15" cy="15" r="4" fill="white"/>
  <circle cx="20" cy="15" r="5" fill="white"/>
  
  <circle cx="70" cy="18" r="6" fill="white"/>
  <circle cx="76" cy="18" r="5" fill="white"/>

  <!-- ground -->
  <rect y="60" width="100" height="40" fill="#6ecb63"/>

  <!-- house -->
  <rect x="20" y="42" width="24" height="18" fill="#ffcc99"/>
  <polygon points="20,42 32,28 44,42" fill="#cc6666"/>
  <rect x="23" y="46" width="4" height="4" fill="white"/>
  <rect x="30" y="48" width="5" height="12" fill="#663300"/>

  <!-- trees -->
  <g>
    <rect x="65" y="45" width="3" height="15" fill="#8b5a2b"/>
    <circle cx="66.5" cy="40" r="8" fill="#2e8b57"/>

    <rect x="80" y="48" width="3" height="12" fill="#8b5a2b"/>
    <circle cx="81.5" cy="44" r="6" fill="#3aa76d"/>

    <rect x="10" y="50" width="3" height="10" fill="#8b5a2b"/>
    <circle cx="11.5" cy="46" r="5" fill="#2e8b57"/>
  </g>

  <!-- flowers -->
  <g>
    <circle cx="50" cy="70" r="1.5" fill="pink"/>
    <circle cx="55" cy="72" r="1.5" fill="yellow"/>
    <circle cx="60" cy="69" r="1.5" fill="pink"/>
    <circle cx="45" cy="74" r="1.5" fill="purple"/>
    <circle cx="52" cy="76" r="1.5" fill="yellow"/>
    <circle cx="58" cy="74" r="1.5" fill="pink"/>
    <circle cx="65" cy="73" r="1.5" fill="pink"/>
  </g>

</svg>

<!-- IMAGE 2 -->
<svg viewBox="0 0 100 100" id="svg2">

  <rect width="100" height="100" fill="#87ceeb"/>

  <!-- cloud moved -->
  <circle cx="17" cy="16" r="5" fill="white"/>
  <circle cx="22" cy="16" r="4" fill="white"/>

  <circle cx="70" cy="18" r="6" fill="white"/>
  <circle cx="76" cy="18" r="5" fill="white"/>

  <rect y="60" width="100" height="40" fill="#6ecb63"/>

  <!-- house slightly different -->
  <rect x="20" y="42" width="24" height="18" fill="#ffd9b3"/>
  <polygon points="20,42 32,28 44,42" fill="#cc6666"/>
  <!-- window missing -->
  <rect x="30" y="48" width="6" height="12" fill="#663300"/>

  <!-- trees slightly different -->
  <g>
    <rect x="65" y="45" width="3" height="15" fill="#8b5a2b"/>
    <circle cx="66.5" cy="41" r="7" fill="#2e8b57"/>

    <rect x="80" y="48" width="3" height="12" fill="#8b5a2b"/>
    <circle cx="81.5" cy="44" r="6" fill="#3aa76d"/>

    <rect x="10" y="50" width="3" height="10" fill="#8b5a2b"/>
    <circle cx="11.5" cy="46" r="5" fill="#2e8b57"/>
  </g>

  <!-- flowers changed -->
  <g>
    <circle cx="50" cy="70" r="1.5" fill="pink"/>
    <circle cx="55" cy="72" r="1.5" fill="orange"/>
    <circle cx="60" cy="69" r="1.5" fill="pink"/>
    <circle cx="45" cy="74" r="1.5" fill="purple"/>
    <circle cx="52" cy="76" r="1.5" fill="yellow"/>
    <circle cx="58" cy="74" r="1.5" fill="pink"/>
    <!-- missing white flower -->
    <circle cx="65" cy="73" r="1.5" fill="pink"/>
  </g>

</svg>

<div id="message">Siempre encuentras los detalles, Pami ❤️</div>

</div>

<script>
  const differences = [
    {x: 20, y: 16}, // cloud
    {x: 25, y: 48}, // window
    {x: 32, y: 55}, // door
    {x: 66, y: 40}, // tree
    {x: 55, y: 72}  // flower
  ];

  let found = [];
  const svgs = [svg1, svg2];

  svgs.forEach(svg => {
    svg.addEventListener("click", (e) => {
      const rect = svg.getBoundingClientRect();

      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      differences.forEach((d, i) => {
        if (found.includes(i)) return;

        const dx = x - d.x;
        const dy = y - d.y;

        if (Math.sqrt(dx*dx + dy*dy) < 5) {
          found.push(i);
          mark(d.x, d.y);
        }
      });

      if (found.length === differences.length) {
        message.classList.add("show");
      }
    });
  });

  function mark(x, y) {
    svgs.forEach(svg => {
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", x);
      c.setAttribute("cy", y);
      c.setAttribute("r", 3);
      c.setAttribute("class", "mark");
      svg.appendChild(c);
    });
  }
</script>

</body>
</html>
