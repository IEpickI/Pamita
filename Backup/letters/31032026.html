<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para tú 🌸</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #d4fc79, #96e6a1);
    font-family: Arial, sans-serif;
    touch-action: manipulation;
  }

  .flower {
    position: absolute;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  svg {
    overflow: visible;
  }

  .petal {
    opacity: 0;
    transform: scale(0);
    transform-origin: center;
    transition: all 0.4s ease;
  }

  .center {
    opacity: 0;
    transform: scale(0);
    transform-origin: center;
    transition: all 0.4s ease;
  }

  .stem {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    transition: stroke-dashoffset 0.8s ease;
  }

  .message {
    margin-top: 5px;
    font-size: 13px;
    color: #2e2e2e;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  
  #instruction {
    position: fixed;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    color: #2e2e2e;
    font-weight: bold;
    pointer-events: none; /* so it doesn’t block taps */
    z-index: 999;
  }
  
</style>
</head>
<body>
<div id="instruction">Click anywhere Pami 💗</div>
<script>
const messages = [
  "Te amo muchooooooooo 💛",
  "Me encantan tus ojos 🤍",
  "Te extraño mucho 😔",
  "Eres súper sexy 😘",
  "Achiota y Tobi te saluda 💖"
];

const petalColors = ['#4a9cff','#ff6f91','#ffb347','#6fcf97','#c77dff','#ff8fb1'];

function random(min, max) {
  return Math.random() * (max - min) + min;
}

function plant(x, y) {
  const container = document.createElement('div');
  container.className = 'flower';
  container.style.left = x + 'px';
  container.style.top = y + 'px';

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", "80");
  svg.setAttribute("height", "120");
  svg.setAttribute("viewBox", "60 60 80 130");

  // Stem first (behind everything)
  const stem = document.createElementNS("http://www.w3.org/2000/svg", "line");
  stem.setAttribute("x1", "100");
  stem.setAttribute("y1", "180");
  stem.setAttribute("x2", "100");
  stem.setAttribute("y2", "90");
  stem.setAttribute("stroke", "#3a7d44");
  stem.setAttribute("stroke-width", "3");
  stem.setAttribute("class", "stem");
  svg.appendChild(stem);

  // Petals
  const petalCoords = [
    [100,65],[110,90],[110,70],[90,70],[90,90],
    [115,80],[100,95],[85,80]
  ];
  const petals = [];
  petalCoords.forEach(([cx, cy]) => {
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", cx);
    c.setAttribute("cy", cy);
    c.setAttribute("r", 8);
    // random color for each petal
    c.setAttribute("fill", petalColors[Math.floor(Math.random()*petalColors.length)]);
    c.setAttribute("class", "petal");
    svg.appendChild(c);
    petals.push(c);
  });

  // Center
  const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  center.setAttribute("cx", "100");
  center.setAttribute("cy", "80");
  center.setAttribute("r", "10");
  center.setAttribute("fill", "#ffe400");
  center.setAttribute("class", "center");
  svg.appendChild(center);

  // Message
  const msg = document.createElement('div');
  msg.className = 'message';
  msg.textContent = messages[Math.floor(Math.random() * messages.length)];

  container.appendChild(svg);
  container.appendChild(msg);
  document.body.appendChild(container);

  // Animate stem
  setTimeout(() => {
    stem.style.strokeDashoffset = "0";
  }, 50);

  // Animate petals and center
  setTimeout(() => {
    petals.forEach(p => {
      p.style.opacity = 1;
      p.style.transform = 'scale(1)';
    });
    center.style.opacity = 1;
    center.style.transform = 'scale(1)';
  }, 700);

  // Show message
  setTimeout(() => {
    msg.style.opacity = 1;
  }, 1100);
}

// touch + click
document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  plant(t.clientX, t.clientY);
});

document.addEventListener('click', (e) => {
  plant(e.clientX, e.clientY);
});
</script>

</body>
</html>
