<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Words</title>

<style>

body{
margin:0;
font-family:system-ui;
text-align:center;
background:#000;
color:white;
}

h1{
margin-top:15px;
}

#game{
position:relative;
width:100%;
max-width:420px;
height:500px;
margin:20px auto;
background:#111;
overflow:hidden;
border-radius:12px;
}

/* hidden words */
.word{
position:absolute;
font-size:26px;
font-weight:bold;
color:#ff7aa8;
}

/* darkness layer */
#darkness{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle 80px at 50% 50%, transparent 0%, black 90%);
}

</style>
</head>

<body>

<h1>Find the Hidden Words</h1>
<p>Move your finger to reveal them.</p>

<div id="game">

<div class="word" style="top:80px; left:40px;">Te</div>
<div class="word" style="top:230px; left:220px;">amo</div>
<div class="word" style="top:350px; left:100px;">chaparrita</div>
<div class="word" style="top:50px; right:60px;">muchísimo</div>
<div class="word" style="bottom:50px; left:260px;">bonita</div>

<div id="darkness"></div>

</div>

<script>

const game = document.getElementById("game")
const darkness = document.getElementById("darkness")

function moveLight(x,y){

darkness.style.background =
`radial-gradient(circle 90px at ${x}px ${y}px, transparent 0%, black 90%)`

}

/* touch support */
game.addEventListener("touchmove", e=>{

const rect = game.getBoundingClientRect()

const x = e.touches[0].clientX - rect.left
const y = e.touches[0].clientY - rect.top

moveLight(x,y)

})

/* mouse support */
game.addEventListener("mousemove", e=>{

const rect = game.getBoundingClientRect()

const x = e.clientX - rect.left
const y = e.clientY - rect.top

moveLight(x,y)

})

</script>

</body>
</html>
