<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Axolotl</title>

<style>

body{
margin:0;
font-family:system-ui;
text-align:center;
background:#dff4ff;
}

h1{
color:#ff4f8b;
margin-top:15px;
}

#scene{
position:relative;
width:100%;
max-width:420px;
height:520px;
margin:20px auto;
background:linear-gradient(#8fd3ff 60%, #7ed47c 60%);
overflow:hidden;
border-radius:15px;
}

/* river */
#river{
position:absolute;
bottom:130px;
width:100%;
height:50px;
background:#5cc3ff;
}

/* general scene items */
.item{
position:absolute;
user-select:none;
}

/* hiding objects */
.hideSpot{
transition:transform .4s;
}

.hideSpot.move{
transform:translateY(-60px);
}

/* axolotl image */
#axolotl{
position:absolute;
width:80px;
display:none;
}

#message{
font-size:20px;
color:#ff4f8b;
min-height:40px;
}

</style>
</head>

<body>

<h1>Find the Axolotl</h1>
<p>Tap objects to search for it.</p>

<div id="scene">

<div id="river"></div>

<!-- sky -->
<img src="images/sun.png" class="item" style="top:15px; right:20px; width:150px;">

<!-- trees -->
<img src="images/tree.png" class="item" style="bottom:185px; left:10px; width:110px;">
<img src="images/tree.png" class="item" style="bottom:190px; right:10px; width:110px;">
<img src="images/tree.png" class="item" style="bottom:100px; right:150px; width:110px;">


<!-- hiding objects -->
<img src="images/rocks.png" class="item hideSpot" style="bottom:80px; left:40px; width:80px;">

<img src="images/bush.png" class="item hideSpot" style="bottom:70px; right:20px; width:90px;">
<img src="images/rocks.png" class="item hideSpot" style="bottom:40px; left:120px; width:80px;">

<img src="images/flower1.png" class="item hideSpot" style="bottom:30px; right:100px; width:70px;">
<img src="images/flower2.png" class="item hideSpot" style="bottom:20px; left:50px; width:70px;">
<img src="images/flower2.png" class="item hideSpot" style="bottom:180px; right:90px; width:70px;">

<!-- axolotl -->
<img src="images/axolotl.png" id="axolotl" style="bottom:70px; left:150px; height:55px">

</div>

<div id="message"></div>

<script>

const spots = document.querySelectorAll(".hideSpot")
const axolotl = document.getElementById("axolotl")
const message = document.getElementById("message")

const secretIndex = Math.floor(Math.random()*spots.length)

spots.forEach((spot,i)=>{

spot.addEventListener("click",()=>{

spot.classList.add("move")

if(i===secretIndex){

axolotl.style.left = (spot.offsetLeft + 10) + "px"
axolotl.style.bottom = (parseInt(spot.style.bottom)+10) + "px"
axolotl.style.display = "block"

message.innerText = "You found the axolotl!"

}else{

message.innerText = "No axolotl here..."

/* go back down after animation */
setTimeout(()=>{
spot.classList.remove("move")
},400)

}

})

})

</script>

</body>
</html>
