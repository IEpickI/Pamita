<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed the Axolotl</title>

<style>

body{
    font-family: system-ui, Arial, sans-serif;
    text-align:center;
    background:#ffeef5;
    margin:0;
    padding:25px 15px;
}

h1{
    color:#ff4f8b;
    font-size:28px;
}

p{
    font-size:16px;
}

#game{
    max-width:420px;
    margin:auto;
}

.axolotl{
    width:70%;
    max-width:220px;
    margin:20px auto;
    transition:transform 0.35s;
}

.happy{
    transform:scale(1.1) rotate(3deg);
}

.sick{
    filter:grayscale(60%);
}

.sleepy{
    transform:rotate(-5deg);
}

.food-container{
    display:flex;
    justify-content:space-around;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:15px 10px;
    font-size:16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#ff77a8;
    color:white;
}

button:active{
    transform:scale(0.95);
}

.food{
    font-size:30px;
    display:block;
    margin-bottom:5px;
}

#message{
    margin-top:25px;
    font-size:18px;
    color:#444;
    min-height:60px;
    line-height:1.4;
}

</style>
</head>

<body>

<div id="game">

<h1>Alimenta al ajolote</h1>
<p>Este pequeño ajolote tiene hambre, ¿puedes alimentarlo?</p>

<svg id="axolotl" class="axolotl" viewBox="0 0 200 120">

<!-- LEFT GILLS -->
<g stroke="#ff7aa8" stroke-width="10" stroke-linecap="round">
<line x1="80" y1="25" x2="70" y2="20"/>
<line x1="75" y1="32" x2="60" y2="32"/>
<line x1="80" y1="40" x2="60" y2="45"/>
</g>

<!-- RIGHT GILLS -->
<g stroke="#ff7aa8" stroke-width="10" stroke-linecap="round">
<line x1="120" y1="25" x2="130" y2="20"/>
<line x1="125" y1="32" x2="140" y2="32"/>
<line x1="120" y1="40" x2="140" y2="45"/>
</g>

<ellipse cx="100" cy="70" rx="55" ry="30" fill="#ff9ec4"/>
<circle cx="100" cy="50" r="35" fill="#ff9ec4"/>

<circle cx="85" cy="45" r="5" fill="#000"/>
<circle cx="115" cy="45" r="5" fill="#000"/>

<path id="mouth" d="M85 60 Q100 70 115 60" stroke="#000" stroke-width="3" fill="transparent"/>

</svg>

<div class="food-container">

<button onclick="feed('taco')">
<span class="food">🌮</span>
Taco
</button>

<button onclick="feed('bramborak')">
<span class="food">🥔</span>
Bramboráky
</button>

<button onclick="feed('worm')">
<span class="food">🪱</span>
Gusano
</button>

</div>

<div id="message"></div>

</div>

<script>

const axolotl = document.getElementById("axolotl")
const mouth = document.getElementById("mouth")
const message = document.getElementById("message")

function reset(){
axolotl.classList.remove("happy","sick","sleepy")
}

function feed(food){

reset()

if(food==="taco"){
axolotl.classList.add("sleepy")
mouth.setAttribute("d","M85 65 Q100 60 115 65")
message.innerHTML =
"🌮 Axolotl probó el taco...<br><br>" +
"Dice: 'Picante... pero interesante'<br>" +
"Quizás menos salsa roja"
}

if(food==="bramborak"){
axolotl.classList.add("happy")
mouth.setAttribute("d","M85 60 Q100 75 115 60")
message.innerHTML =
"🥔 Axolotl AMA el bramborák!<br><br>" +
"Dice: 'Alimentos checos aprobados.'<br>" +
"Tal vez algún día los cocine para ti ❤️"
}

if(food==="worm"){
axolotl.classList.add("happy")
mouth.setAttribute("d","M85 60 Q100 80 115 60")
message.innerHTML =
"🪱 Axolotl es SUPER feliz!<br><br>" +
"Los gusanos son su comida favorita.<br>" +
"Se mueve alegremente y te envía un abrazo de ajolote."
}

}

</script>

</body>
</html>
