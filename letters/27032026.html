<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minigaaaame</title>
<style>
  .controls {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

	button {
	  padding: 16px 22px;
	  font-size: 18px;
	  border-radius: 10px;
	}
	canvas {
	  width: 95vw;       /* almost full screen width */
	  max-width: 480px;  /* don’t stretch too much on desktop */
	  height: auto;
	  display: block;
	  margin: 10px auto;
	  border: 2px solid black;
	}

</style>
<body onload="startGame()" style="text-align:center; font-family:sans-serif;">

<div id="gameContainer"></div>

<div class="controls">
  <div class="row">
    <button 
      onmousedown="moveUp()" onmouseup="stopMove()"
      ontouchstart="moveUp()" ontouchend="stopMove()">
      UP
    </button>
  </div>

  <div class="row">
    <button 
      onmousedown="moveLeft()" onmouseup="stopMove()"
      ontouchstart="moveLeft()" ontouchend="stopMove()">
      LEFT
    </button>

    <button 
      onmousedown="moveRight()" onmouseup="stopMove()"
      ontouchstart="moveRight()" ontouchend="stopMove()">
      RIGHT
    </button>
  </div>

  <div class="row">
    <button 
      onmousedown="moveDown()" onmouseup="stopMove()"
      ontouchstart="moveDown()" ontouchend="stopMove()">
      DOWN
    </button>
  </div>

  <div class="row">
    <button onclick="restartGame()">RESTART</button>
  </div>
</div>

<script>
let myGamePiece;
let myObstacles = [];
let myScore;
let obstacleSpeed = 2;

const myGameArea = {
    canvas: document.createElement("canvas"),
    start: function () {
		this.canvas.width = 480;
		this.canvas.height = 270;
		this.context = this.canvas.getContext("2d");

		document.getElementById("gameContainer").appendChild(this.canvas);

		this.frameNo = 0;
		this.interval = setInterval(updateGameArea, 20);
	},
    clear: function () {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
};

function startGame() {
    myGameArea.start();
    myGamePiece = new component(30, 30, "red", 50, 120);
    myScore = new component("20px", "Consolas", "black", 350, 30, "text");
}

function component(width, height, color, x, y, type) {
    this.type = type;
    this.width = width;
    this.height = height;
    this.x = x;
    this.y = y;

    this.speedX = 0;
    this.speedY = 0;

    this.update = function () {
        const ctx = myGameArea.context;

        if (this.type == "text") {
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = color;
            ctx.fillText(this.text, this.x, this.y);
        } else {
            ctx.fillStyle = color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    };

    this.newPos = function () {
        this.x += this.speedX;
        this.y += this.speedY;
    };

    this.crashWith = function (other) {
        return !(
            this.y + this.height < other.y ||
            this.y > other.y + other.height ||
            this.x + this.width < other.x ||
            this.x > other.x + other.width
        );
    };
}

function updateGameArea() {
    for (let i = 0; i < myObstacles.length; i++) {
        if (myGamePiece.crashWith(myObstacles[i])) {
			clearInterval(myGameArea.interval);
			return;
		}
    }

    myGameArea.clear();
    myGameArea.frameNo++;
	
	if (myGameArea.frameNo % 300 === 0) 
	{
		obstacleSpeed += 1.0;
	}

    // create obstacles
	let spawnRate = Math.max(40, 120 - obstacleSpeed * 15);
	
    if (myGameArea.frameNo == 1 || myGameArea.frameNo % spawnRate === 0) {
        let x = myGameArea.canvas.width;
        let height = Math.floor(Math.random() * 150);
        let gap = 80;

        myObstacles.push(new component(10, height, "green", x, 0));
        myObstacles.push(new component(10, 270 - height - gap, "green", x, height + gap));
    }

    // move obstacles
    for (let i = 0; i < myObstacles.length; i++) {
        myObstacles[i].x -= obstacleSpeed;
        myObstacles[i].update();
    }

    myGamePiece.newPos();
    myGamePiece.update();

    myScore.text = "SCORE: " + myGameArea.frameNo;
    myScore.update();
}

function restartGame() {
    clearInterval(myGameArea.interval);

    myObstacles = [];
    myGameArea.clear();
	obstacleSpeed = 2;

    startGame();
}

// controls
function moveUp() { myGamePiece.speedY = -4; }
function moveDown() { myGamePiece.speedY = 4; }
function moveLeft() { myGamePiece.speedX = -4; }
function moveRight() { myGamePiece.speedX = 4; }
function stopMove() { myGamePiece.speedX = 0; myGamePiece.speedY = 0; }

</script>
