<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achiotaaaa</title>

<style>

body{
margin:0;
font-family:system-ui;
text-align:center;
background:#bfeaff;
}

h1{
color:#ff4f8b;
margin-top:15px;
}

#game{
position:relative;
width:100%;
max-width:420px;
height:520px;
margin:20px auto;
background:linear-gradient(#8fd3ff,#4fc3f7);
overflow:hidden;
border-radius:14px;
}

#axolotl{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90px;
height:55px;
pointer-events:none;
}

.item{
position:absolute;
font-size:32px;
}

.obstacle{
font-size:36px;
}

#message{
font-size:20px;
color:#444;
min-height:40px;
}

#score{
font-size:18px;
}

</style>
</head>

<body>

<h1>Achiota Swim</h1>
<p>Collect hearts and flowers!</p>

<div id="game">

<img src="images/axolotl.png" id="axolotl">

</div>

<div id="score">Collected: 0 / 10</div>
<div id="message"></div>

<button id="restart" onclick="restartGame()" style="display:none; padding:12px 20px; font-size:16px; border:none; border-radius:10px; background:#ff77a8; color:white; margin-top:10px;">
Restart
</button>

<script>

const game = document.getElementById("game")
const axolotl = document.getElementById("axolotl")
const scoreText = document.getElementById("score")
const message = document.getElementById("message")
const restartBtn = document.getElementById("restart")

let score = 0
let playing = true

/* move axolotl */

game.addEventListener("touchmove", e=>{

if(!playing) return

const rect = game.getBoundingClientRect()
let x = e.touches[0].clientX - rect.left

x = Math.max(40,Math.min(rect.width-40,x))

axolotl.style.left = x+"px"

})

game.addEventListener("mousemove", e=>{

if(!playing) return

const rect = game.getBoundingClientRect()
let x = e.clientX - rect.left

x = Math.max(40,Math.min(rect.width-40,x))

axolotl.style.left = x+"px"

})

function restartGame(){

score = 0
playing = true

scoreText.innerText = "Collected: 0 / 10"
message.innerText = ""

restartBtn.style.display = "none"

/* remove leftover items */
document.querySelectorAll(".item").forEach(e=>e.remove())

}

/* spawn items */

function spawn(){

if(!playing) return

const item = document.createElement("div")
item.classList.add("item")

const type = Math.random()

/* GOOD ITEMS */

if(type < 0.35){

item.textContent="❤️"
item.dataset.type="good"

}else if(type < 0.7){

item.textContent="🌸"
item.dataset.type="good"

/* OBSTACLES */

}else{

const obstacles = ["🪨","🦀","🗑️"]
item.textContent = obstacles[Math.floor(Math.random()*obstacles.length)]

item.dataset.type="bad"
item.classList.add("obstacle")

}

item.style.left = Math.random()*(game.offsetWidth-40)+"px"
item.style.top = "-40px"

game.appendChild(item)

let y=-40

const fall = setInterval(()=>{

if(!playing){
clearInterval(fall)
item.remove()
return
}

y+=4
item.style.top=y+"px"

const itemRect = item.getBoundingClientRect()
const axoRect = axolotl.getBoundingClientRect()

if(
itemRect.bottom > axoRect.top &&
itemRect.left < axoRect.right &&
itemRect.right > axoRect.left
){

clearInterval(fall)

if(item.dataset.type==="good"){

score++
scoreText.innerText="Collected: "+score+" / 10"

if(score>=10){

playing=false
message.innerText="Achiota swam all the way to you ❤️"
restartBtn.style.display="inline-block"

}

}else{

playing=false
message.innerText="Game Over! Achiota hit an obstacle... Ouch 🙁"
restartBtn.style.display="inline-block"

}

item.remove()

}

if(y > game.offsetHeight){

clearInterval(fall)
item.remove()

}

},30)

}

setInterval(spawn,900)

</script>


</body>
</html>
