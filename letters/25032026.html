<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: sans-serif;
    color: white;
  }

  #puzzle {
    width: 90vw;
    max-width: 400px;
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }

  .piece {
    background-image: url("images/IMG_2899.jpg");
    background-size: 300% 300%;
    border-radius: 6px;
    transition: transform 0.15s, outline 0.15s;
  }

  .selected {
    outline: 3px solid white;
    transform: scale(0.95);
  }

  #message {
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #message.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div id="puzzle"></div>
<div id="message">Para ti, Pami ❤️</div>

<script>
  const puzzle = document.getElementById("puzzle");
  const message = document.getElementById("message");

  const size = 3;
  let pieces = [];
  let selected = null;

  // create pieces
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      let div = document.createElement("div");
      div.classList.add("piece");

      div.style.backgroundPosition = `${(x/(size-1))*100}% ${(y/(size-1))*100}%`;
      div.dataset.correct = `${x},${y}`;

      pieces.push(div);
    }
  }

  // shuffle
  pieces.sort(() => Math.random() - 0.5);
  pieces.forEach(p => puzzle.appendChild(p));

  pieces.forEach(piece => {
    piece.addEventListener("click", () => {
      if (!selected) {
        selected = piece;
        piece.classList.add("selected");
        return;
      }

      if (selected === piece) {
        selected.classList.remove("selected");
        selected = null;
        return;
      }

      // swap positions visually
      let temp = selected.style.backgroundPosition;
      selected.style.backgroundPosition = piece.style.backgroundPosition;
      piece.style.backgroundPosition = temp;

      selected.classList.remove("selected");
      selected = null;

      checkWin();
    });
  });

  function checkWin() {
    let correct = true;

    const all = document.querySelectorAll(".piece");

    all.forEach((piece, index) => {
      let x = index % size;
      let y = Math.floor(index / size);

      let expected = `${x},${y}`;
      if (piece.dataset.correct !== expected) {
        correct = false;
      }
    });

    if (correct) {
      message.classList.add("show");
    }
  }
</script>

</body>
</html>
